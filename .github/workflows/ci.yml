name: CI

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main ]

jobs:
  build-and-test:
    name: Build & Test (Ubuntu ${{ matrix.os }}, ${{ matrix.build_type }})
    runs-on: ubuntu-${{ matrix.os }}

    strategy:
      fail-fast: false
      matrix:
        os: [22.04, 24.04]
        build_type: [Debug, Release]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y cmake g++ libgtest-dev

      - name: Configure
        run: |
          cmake -S . -B build \
            -DCMAKE_BUILD_TYPE=${{ matrix.build_type }} \
            -DCMAKE_CXX_COMPILER=g++

      - name: Build
        run: cmake --build build --parallel $(nproc)

      - name: Run tests
        working-directory: build
        run: ctest --output-on-failure --parallel $(nproc)

  lint:
    name: Clang-Format Check
    runs-on: ubuntu-22.04

    steps:
      - uses: actions/checkout@v4
      - name: Install clang-format
        run: sudo apt-get install -y clang-format-15

      - name: Check formatting
        run: |
          find src tests -name '*.cpp' -o -name '*.hpp' | \
            xargs clang-format-15 --dry-run --Werror
